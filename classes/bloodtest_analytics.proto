// Контракт gRPC-сервиса аналитики книг
//
// Определяет сервис BloodTestAnalytics с одним RPC-методом AnalyzeBloodTest.
// Из этого файла protoc + protoc-gen-grpc-java генерируют:
// Классы сообщений - AnalyzeBloodTestRequest, BloodTestAnalysisResponse
// Серверный базовый класс BloodTestAnalyticsGrpc.BloodTestAnalyticsImplBase
// Клиентские стабы BloodTestAnalyticsGrpc.BloodTestAnalyticsBlockingStub

syntax = "proto3";

// Java-пакет для сгенерированных классов
option java_package = "edu.rutmiit.demo.grpc";

// Все сгенерированные классы будут в отдельных файлах (не во вложенных классах)
option java_multiple_files = true;

// Пакет proto (для именования в других .proto файлах при импорте)
package bloodtestanalytics;

// Сервисы
// Unary RPC - один запрос это один ответ (типа аналог REST GET/POST)
service BloodTestAnalytics {

    // Анализирует книгу и возвращает вычисленные метрики
    rpc AnalyzeBloodTest (AnalyzeBloodTestRequest) returns (BloodTestAnalysisResponse);
}

// Сообщения
// В proto3 все поля опциональны по умолчанию (zero-value = не задано).
// Номера полей (1, 2, 3...) используются в бинарном формате —
// они не должны меняться после релиза
// чтобы не нарушить совместимость

// Запрос на анализ анализа крови — данные, необходимые для вычисления метрик.
// Integer отнести к int или ???
message AnalyzeBloodTestRequest {
    int64 bloodtest_id    = 1;
    string gender         = 2;
    int32 gemoglobin      = 3;
    int32 eritrozit       = 4;
    int32 trombozit       = 5;
    int32 leikozit        = 6;
    int32 palochloyader   = 7;
    int32 segmentoyader   = 8;
    int32 bazophil        = 9;
    int32 limphozit       = 10;
}

// Ответ с результатами анализа — вычисленные метрики книги.
message BloodTestAnalysisResponse {
        int64  blood_test_id              = 1;  // ID теста (echo back)
        int32  retest_advice              = 2;  // Оценка, когда пересдать анализ (в неделях)
        string action_level               = 3;  // Уровень действия пациента: NONE, CONSULT, URGENT
        double score_test                 = 4;  // Оценка всех показателей в общем (0.0 — 10.0)
}
